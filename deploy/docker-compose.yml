version: '3.8'

services:
  # 前端服务 - Nginx
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: xly-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - xly-network
    volumes:
      # nginx配置可以热更新
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - TZ=Asia/Shanghai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 后端服务 - Node.js
  backend:
    build:
      context: ../dev/backend
      dockerfile: ../../deploy/Dockerfile.backend
    container_name: xly-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - xly-network
    volumes:
      # 挂载上传目录到宿主机，保证数据持久化
      - /data/uploads:/app/uploads:rw
    env_file:
      - ../prod/backend/.env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  xly-network:
    driver: bridge
