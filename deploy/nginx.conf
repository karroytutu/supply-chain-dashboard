server {
    listen 3000;
    server_name localhost xly.gzzxd.com;
    root /usr/share/nginx/html;
    index index.html;

    # 全局文件上传大小限制（支持最大 50MB）
    client_max_body_size 50m;

    # 开启 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # 上传文件服务代理 - 转发到后端静态文件服务
    # 使用 ^~ 前缀匹配，优先级高于正则 location，确保所有 /uploads/ 请求都代理到后端
    location ^~ /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 缓存策略 - 上传文件长期缓存
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # API 代理 - 转发到后端服务
    # 使用 host 网络模式时，后端在 localhost:8000
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 文件上传相关配置
        client_max_body_size 50m;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 静态资源缓存 - 带hash的文件长期缓存（8位以上十六进制hash）
    location ~* "\.[0-9a-f]{8,}\.(js|css)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 不带hash的JS/CSS资源不缓存
    location ~* "\.(js|css)$" {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由支持 - 所有路由都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://g.alicdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-src 'self' https://login.dingtalk.com" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
