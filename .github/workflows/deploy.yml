name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装前端依赖
        working-directory: dev/frontend
        run: npm ci

      - name: 安装后端依赖
        working-directory: dev/backend
        run: npm ci

      - name: 构建前端
        working-directory: dev/frontend
        run: npm run build

      - name: 构建后端
        working-directory: dev/backend
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            prod/frontend/dist
            prod/backend/dist
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: prod

      - name: 创建部署包
        run: |
          tar -czf deploy-package.tar.gz \
            prod/ \
            deploy/ \
            --exclude='deploy/scripts/*.sh'

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e

            # 项目路径
            PROJECT_PATH="${{ secrets.DEPLOY_PATH }}"
            cd $PROJECT_PATH

            # 保存当前版本用于回滚
            if [ -d "prod" ]; then
              rm -rf prod.backup
              cp -r prod prod.backup
            fi

            # 拉取最新代码
            git fetch origin
            git reset --hard origin/main

            # 复制环境配置
            if [ -f "prod/backend/.env" ]; then
              cp prod/backend/.env prod/backend/.env.backup
            fi

      - name: 上传部署包并执行部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e

            PROJECT_PATH="${{ secrets.DEPLOY_PATH }}"
            cd $PROJECT_PATH

            # 构建并启动 Docker 容器
            cd deploy
            docker-compose down || true
            docker-compose build --no-cache
            docker-compose up -d

            # 等待服务启动
            sleep 10

            # 健康检查
            echo "执行健康检查..."

            # 检查前端服务 (端口 3000)
            if ! curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "前端服务启动失败"
              exit 1
            fi
            echo "前端服务正常"

            # 检查后端服务 (端口 8000)
            if ! curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "后端服务启动失败"
              exit 1
            fi
            echo "后端服务正常"

            echo "部署成功!"

      - name: 部署失败回滚
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            PROJECT_PATH="${{ secrets.DEPLOY_PATH }}"
            cd $PROJECT_PATH

            echo "部署失败，执行回滚..."

            # 恢复备份
            if [ -d "prod.backup" ]; then
              rm -rf prod
              mv prod.backup prod
            fi

            # 重启服务
            cd deploy
            docker-compose down
            docker-compose up -d

            echo "回滚完成"
